
<!-- Fragmento para registrar -->
<div th:fragment="registrarForm">
    <div class="modal-content">
        <h3 class="titulo-formulario">FORMULARIO DE USUARIO</h3>
        <hr>        
        <form action="/usuario/registrar" method="post">
            <!-- campos de registro -->
            <div class="formulario-usuario">  
                <!-- Columna Izquierda: Imagen -->
                <div class="imagen-usuario">
                    <label>Imagen del Usuario</label>
                    <div class="preview-imagen">
                        <img id="preview" src="/img/default-user.png" alt="Imagen Usuario" />
                    </div>
                    <input type="file" id="fileInput" name="imagen" style="display: none;" onchange="mostrarVistaPrevia(event)">
                    <div class="botones-img">
                        <button type="button" onclick="document.getElementById('fileInput').click()">Agregar</button>
                        <button type="button" onclick="eliminarImagen()">Eliminar</button>
                    </div>
                </div>
                <!-- Columna Derecha: Campos -->
                <div class="campos-usuario">
                    <h4>Información de Usuario</h4>
                    <label>DNI:</label>
                    <input type="text" name="dni" required>

                    <label>Nombres:</label>
                    <input type="text" name="nombres" required>

                    <label>Código:</label>
                    <input type="text" name="codigo" required>

                    <label>Grado:</label>
                    <select name="grado" required>
                        <option>Capitán</option>
                        <option>Teniente</option>
                        <option>Suboficial</option>
                        <!-- Agrega más según tus datos -->
                    </select>

                    <hr>

                    <h4>Credenciales de Usuario</h4>
                    <label>Usuario:</label>
                    <input type="text" name="usuario" required>

                    <label>Contraseña:</label>
                    <input type="password" name="password" required>

                    <label>Rol:</label>
                    <select name="rol" required>
                        <option>Administrador</option>
                        <option>Usuario</option>
                        <!-- Otros roles -->
                    </select>

                    <label>Estado:</label>
                    <select name="estado" required>
                        <option>Activo</option>
                        <option>Inactivo</option>
                    </select>
                </div>
                <!-- Botones de acción -->
                <div class="botones-formulario">
                    <button type="submit" class="btn-guardar">
                        <i class="fa fa-save"></i> Guardar
                    </button>
                    <button type="button" class="btn-cancelar" onclick="cerrarModal()">
                        <i class="fa fa-times"></i> Cancelar
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<div th:fragment="visualizarForm">
    <h3>Visualizar Usuario</h3>
    <div>
        <!-- detalles del usuario en modo solo lectura -->
    </div>
</div>

<div th:fragment="editarForm">
    <h3>Editar Usuario</h3>
    <form action="/usuario/editar" method="post">
        <!-- campos editables -->
    </form>
</div>
