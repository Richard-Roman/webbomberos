<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Personal</title>
    <link rel="stylesheet" href="/css/stylesmain.css">
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700,900" rel="stylesheet">
</head>

<body>

    <!-- Siderbar -->

    <div class="container">
        <span th:replace="~{includes/sidebar :: .sidebar}"></span>

        <!-- Modales -->
        <div class="modal" id="modalRegistrar" style="display: none;">
            <div class="modal-content">
                <span class="close" onclick="closeModal('modalRegistrar')">&times;</span>
                <div th:replace="~{intranet/Usuarios/formusers :: registrarForm}"></div>
            </div>
        </div>
        <div class="modal" id="modalVisualizar" style="display: none;">
            <div class="modal-content">
                <span class="close" onclick="closeModal('modalVisualizar')">&times;</span>
                <div th:replace="~{intranet/Usuarios/formusers :: visualizarForm}"></div>
            </div>
        </div>
        <div class="modal" id="modalEditar" style="display: none;">
            <div class="modal-content">
                <span class="close" onclick="closeModal('modalEditar')">&times;</span>
                <div th:replace="~{intranet/Usuarios/formusers :: editarForm}"></div>
            </div>
        </div>

    <!-- Tabla -->
        <div class="content">
            <div class="cabeza">
                <h2>INICIO</h2>
        
                <div class="perfil">
                    <p class="bomb">Kent Miranda</p>
                    <img class="foto" src="/img/perfil.png" alt="" height="65px">
                    <p class="uwu">uw</p>
                    <img src="/img/salida.png" alt="" height="35px" onclick="logout()" style="cursor: pointer;">
                </div>
            </div>
            <div class="contenido">
                <div class="barra-superior">
                    <div class="buscar-section">
                        <h3>Buscar</h3>
                        <div class="input-container">
                            <input type="text" id="buscar" placeholder="Search...">
                            <span class="icono-buscar">🔍</span>
                        </div>
                    </div>
                    <button id="FormRegist"  class="btn-asignar">+ Asignar Nuevo</button>
                </div>

                <div class="tabla-usuarios">
                    <div class="encabezado-lista">
                        <div class="titulo-paginacion">
                            <h3>Lista de Usuarios</h3>
                            <div class="paginacion">
                                <span class="flecha">&lt;</span>
                                <span class="pagina-actual">1 de 1</span> 
                                <span class="flecha">&gt;</span>
                            </div>
                        </div>
                        <hr class="separador">
                    </div>
    
                    <table>
                        <thead>
                            <tr>
                                <th>Usuario</th>
                                <th>Nombre</th>
                                <th>Código</th>
                                <th>Grado</th>
                                <th>Rol</th>
                                <th>Estado</th>
                                <th class="uno">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="lista: ${lista}">
                                <td>[[${lista.username}]]</td>
                                <td>Kent Tare Quispe Tananta</td>
                                <td>120-1230-12-A</td>
                                <td>Capitán</td>
                                <td>Desarrollador</td>
                                <td><span class="activo">Activo</span></td>
                                <td>
                                    <div class="acciones-contenedor">
                                        <a th:href="@{'viewuser/' + ${lista.Id_Usuario}}" class="accion">
                                            <img src="/img/ver.png" alt="Ver">
                                        </a>                                        
                                        <a th:href="@{'edituser/' + ${lista.Id_Usuario}}" class="accion">
                                            <img src="/img/editar.png" alt="Editar">
                                        </a>                                       
                                         <button class="accion"><img src="/img/desactivar.png" alt="Eliminar"></button>
                                    </div>
                                </td>
                            </tr>
                            <!-- Más filas aquí -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="/js/userregistros.js"></script> 

</body>

</html>
